name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gbm-backends:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install libomp (LightGBM)
        run: sudo apt-get update && sudo apt-get install -y libgomp1
      - name: Install with all GBM extras
        run: pip install -e ".[dev,gbm,xgb,catboost]"
      - name: Tabular backend tests
        run: pytest tests/test_tabular_backends.py -v

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install libomp (macOS, LightGBM)
        if: runner.os == 'macOS'
        run: brew install libomp
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,gbm,finance,docs]"
      - name: Lint (ruff)
        run: |
          ruff check .
          ruff format --check .
      - name: Type-check (mypy)
        run: mypy
      - name: Test
        run: pytest --cov=deup --cov-report=term-missing
      - name: Tutorial smoke tests
        run: pytest tests/test_tutorials.py -v
      - name: Docs build (strict)
        run: mkdocs build --strict
