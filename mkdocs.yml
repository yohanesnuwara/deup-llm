site_name: deup
site_url: https://ursinasanderink.github.io/deup/
repo_url: https://github.com/ursinasanderink/deup
repo_name: ursinasanderink/deup

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: numpy
            show_source: false
            members_order: source

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Theory & math: theory.md
  - Losses & transforms: losses.md
  - Feature builders: features.md
  - Decomposition & ranking: decomposition.md
  - Conformal calibration: calibration.md
  - Aggregation reliability: reliability.md
  - Benchmarks: benchmarks.md
  - API:
      - DEUPRegressor: api/estimators.md
      - Feature builders: api/features.md
      - Decomposition: api/decomposition.md
      - Calibration: api/calibration.md
      - Diagnostics: api/diagnostics.md
      - Splitters: api/splitters.md
      - Core: api/core.md

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
